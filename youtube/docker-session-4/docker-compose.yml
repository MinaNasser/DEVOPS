services:
  frontend:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend-net
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - ./backend/.env.development
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3001}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-Al5al}:${POSTGRES_PASSWORD:-MinaAl5al}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-myapp}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - frontend-net
      - backend-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:${PORT:-3001}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file:
      - ./backend/.env.development
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-Al5al}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-MinaAl5al}
      - POSTGRES_DB=${POSTGRES_DB:-myapp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-Al5al} -d ${POSTGRES_DB:-myapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
# Uncomment the following section to use Docker secrets for database credentials instead of environment variables. 
# Make sure to create the secret files with the appropriate values before running the containers.
#
# secrets:
#   db_password:
#     file: ./backend/.env.development
