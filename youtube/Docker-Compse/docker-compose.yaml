services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./Proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./Proxy/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - auth-service
      - order-service
      - homer-service

  auth-service:
    build:
      context: ./Auth
    image: auth-service:latest

  order-service:
    build:
      context: ./Order
    image: order-service:latest

  homer-service:
    image: b4bz/homer
    container_name: homer
    volumes:
      - ./homer/assets:/www/assets
    # ports:   # علقها أو اشيلها
    #   - "8080:8080"
    user: 1000:1000
    environment:
      - INIT_ASSETS=0
      - SUBFOLDER=/homer
    restart: unless-stopped