# frontend/nginx.conf

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # تنسيق الـ logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log debug;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # ✅ لخدمة الملفات الستاتيكية (HTML, CSS, JS)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ✅ لخدمة ملفات assets (css, js, images)
        location /assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # ✅ توجيه طلبات API إلى Traefik/Backend
        location /api/ {

            proxy_pass http://traefik:80;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # مهم جداً للـ API
            proxy_set_header Accept-Encoding "";
            proxy_set_header Origin "";

            # timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ✅ منع الوصول للملفات المخفية
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ✅ صفحة الخطأ المخصصة
        error_page 404 /error.html?msg=404%20Not%20Found;
        error_page 500 502 503 504 /error.html?msg=Server%20Error;
    }
}